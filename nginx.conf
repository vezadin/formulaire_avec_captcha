events {}

http {
    server {
        listen 80;
        server_name monformulaire.local;

        root /var/www/html;
        index index.php index.html;

        # Route toutes les requêtes vers PHP sauf fichiers statiques
        location / {
            proxy_pass http://php-apache:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Gestion des fichiers CSS, JS, images, etc.
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /var/www/html;
            access_log off;
            expires 30d;
        }

        # Sécurité : bloquer les fichiers sensibles
        location ~ /\.(ht|git|env|dockerignore) {
            deny all;
        }
    }
}
