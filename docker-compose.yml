version: '3.8'

services:
  php-apache:
    build: .
    volumes:
      - .:/var/www/html
      - ./sessions:/var/lib/php/sessions
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "80"

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    depends_on:
      - php-apache
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - .:/var/www/html
